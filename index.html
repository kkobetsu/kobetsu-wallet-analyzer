<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kobetsu Abstract Title Scanner</title>
  <style>
    :root {
      --bg: #f7fff9;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(27, 204, 118, 0.16);
      --line-strong: rgba(27, 204, 118, 0.3);
      --text: #102118;
      --muted: #62786d;
      --green: #16cf73;
      --shadow: 0 26px 80px rgba(14, 35, 24, 0.12);
      --danger: #c94a69;
      --radius-xl: 32px;
      --radius-lg: 24px;
      --max-width: 1040px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(22, 207, 115, 0.14), transparent 30%),
        radial-gradient(circle at 100% 10%, rgba(22, 207, 115, 0.12), transparent 26%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }

    .page {
      width: min(100% - 24px, var(--max-width));
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      align-content: center;
      padding: 28px 0 36px;
      gap: 18px;
    }

    .top-lane {
      position: relative;
      height: 92px;
      overflow: hidden;
      border-radius: 28px;
      background: transparent;
    }

    .runner-wrap {
      position: absolute;
      inset: 0;
      animation: lane-move 11s linear infinite;
    }

    .runner-logo {
      position: absolute;
      top: 16px;
      left: 0;
      width: 58px;
      height: 58px;
      object-fit: contain;
      animation: logo-spin 2.4s linear infinite;
      filter: drop-shadow(0 0 16px rgba(22, 207, 115, 0.38));
    }

    .runner-dog {
      position: absolute;
      top: 20px;
      left: -76px;
      width: 52px;
      height: 52px;
      object-fit: contain;
      image-rendering: pixelated;
      animation: dog-bounce 0.8s ease-in-out infinite;
    }

    @keyframes lane-move {
      from { transform: translateX(-120px); }
      to { transform: translateX(calc(100vw + 120px)); }
    }

    @keyframes logo-spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes dog-bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .search-shell {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 14px;
      align-items: center;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      height: 82px;
      padding: 0 20px;
      border-radius: 28px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.98);
    }

    .input-wrap img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 22px;
      font-weight: 900;
    }

    input::placeholder {
      color: #8aa095;
      font-weight: 700;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      height: 82px;
      border-radius: 28px;
      font-size: 18px;
      font-weight: 900;
      color: #072014;
      background: linear-gradient(135deg, #97f6bf 0%, #49df8e 55%, #13bc68 100%);
      box-shadow: 0 14px 30px rgba(19, 188, 104, 0.24);
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
    }

    .status {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid transparent;
      font-size: 14px;
      line-height: 1.6;
    }

    .status.visible { display: block; }

    .status.loading {
      color: #2d5a49;
      background: rgba(244, 255, 248, 0.96);
      border-color: rgba(27, 204, 118, 0.16);
    }

    .status.error {
      color: var(--danger);
      background: rgba(255, 246, 248, 0.96);
      border-color: rgba(201, 74, 105, 0.18);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(241, 255, 247, 0.62);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .overlay.visible {
      display: grid;
    }

    .summary-card {
      position: relative;
      width: min(100%, 920px);
      border-radius: 36px;
      border: 1px solid var(--line-strong);
      background:
        radial-gradient(circle at top center, rgba(22, 207, 115, 0.15), transparent 36%),
        rgba(255, 255, 255, 0.98);
      box-shadow: 0 34px 90px rgba(14, 35, 24, 0.18);
      overflow: hidden;
    }

    .close-button {
      position: absolute;
      right: 18px;
      top: 18px;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      border: 1px solid rgba(27, 204, 118, 0.14);
      background: rgba(243, 255, 248, 0.96);
      color: #177a49;
      font-size: 24px;
      font-weight: 800;
      box-shadow: none;
    }

    .detail-link {
      position: absolute;
      top: 24px;
      right: 84px;
      appearance: none;
      border: none;
      background: transparent;
      color: #157749;
      font-size: 14px;
      font-weight: 800;
      text-decoration: underline;
      height: auto;
      box-shadow: none;
      padding: 0;
    }

    .summary-body {
      padding: 42px 34px 30px;
      display: grid;
      gap: 18px;
      justify-items: center;
      text-align: center;
    }

    .summary-title {
      margin: 0;
      font-size: clamp(68px, 13vw, 150px);
      line-height: 0.84;
      letter-spacing: -0.1em;
      font-weight: 900;
      color: var(--green);
      text-shadow: 0 0 28px rgba(22, 207, 115, 0.2);
    }

    .summary-name {
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .summary-wallet {
      color: var(--muted);
      font-size: 15px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .summary-flavor {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      max-width: 720px;
    }

    .detail-panel {
      display: none;
      width: 100%;
      margin-top: 10px;
      padding-top: 18px;
      border-top: 1px solid rgba(27, 204, 118, 0.1);
    }

    .detail-panel.visible {
      display: block;
    }

    .detail-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      text-align: left;
    }

    .detail-item {
      padding: 16px;
      border-radius: 18px;
      background: rgba(248, 255, 251, 0.96);
      border: 1px solid rgba(27, 204, 118, 0.1);
    }

    .detail-key {
      color: #678076;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .detail-value {
      font-size: 24px;
      line-height: 1.06;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #153023;
      word-break: break-word;
    }

    .detail-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .detail-note:empty {
      display: none;
    }

    @media (max-width: 720px) {
      .search-row {
        grid-template-columns: 1fr;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .summary-body {
        padding: 52px 20px 24px;
      }

      .detail-link {
        top: 20px;
        right: 76px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="top-lane">
      <div class="runner-wrap">
        <img class="runner-logo" src="./assets/abstract-glow.png" alt="Abstract logo" />
        <img class="runner-dog" src="./assets/kobetsu-pfp.png" alt="Running dog" />
      </div>
    </div>

    <section class="search-shell">
      <form id="search-form">
        <div class="search-row">
          <div class="input-wrap">
            <input id="query-input" type="text" placeholder="Enter wallet or nickname" autocomplete="off" spellcheck="false" />
            <img src="./assets/abstract-glow.png" alt="Abstract" />
          </div>
          <button id="submit-button" type="submit">Search</button>
        </div>
      </form>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <section id="overlay" class="overlay">
    <article class="summary-card">
      <button id="close-button" class="close-button" type="button">×</button>
      <button id="detail-link" class="detail-link" type="button">View details</button>

      <div class="summary-body">
        <h1 id="summary-title" class="summary-title">-</h1>
        <div id="summary-name" class="summary-name">-</div>
        <div id="summary-wallet" class="summary-wallet">-</div>
        <div id="summary-flavor" class="summary-flavor">-</div>

        <div id="detail-panel" class="detail-panel">
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-key">Portal Tier</div>
              <div id="detail-tier" class="detail-value">-</div>
              <div id="detail-tier-note" class="detail-note">-</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Badge Count</div>
              <div id="detail-badges" class="detail-value">-</div>
              <div class="detail-note">Claimed portal badges</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Transactions</div>
              <div id="detail-tx" class="detail-value">-</div>
              <div class="detail-note">All-time onchain transactions</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Gas Fee Spent</div>
              <div id="detail-fee" class="detail-value">-</div>
              <div class="detail-note">All-time gas paid by this wallet</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Wallet Age</div>
              <div id="detail-age" class="detail-value">-</div>
              <div id="detail-age-note" class="detail-note">-</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Favorite App</div>
              <div id="detail-app" class="detail-value">-</div>
              <div id="detail-app-note" class="detail-note">-</div>
            </div>
          </div>
        </div>
      </div>
    </article>
  </section>

  <script>
    const form = document.getElementById("search-form");
    const queryInput = document.getElementById("query-input");
    const submitButton = document.getElementById("submit-button");
    const statusBox = document.getElementById("status");
    const overlay = document.getElementById("overlay");
    const closeButton = document.getElementById("close-button");
    const detailLink = document.getElementById("detail-link");
    const detailPanel = document.getElementById("detail-panel");

    const fields = {
      title: document.getElementById("summary-title"),
      name: document.getElementById("summary-name"),
      wallet: document.getElementById("summary-wallet"),
      flavor: document.getElementById("summary-flavor"),
      tier: document.getElementById("detail-tier"),
      tierNote: document.getElementById("detail-tier-note"),
      badges: document.getElementById("detail-badges"),
      tx: document.getElementById("detail-tx"),
      fee: document.getElementById("detail-fee"),
      age: document.getElementById("detail-age"),
      ageNote: document.getElementById("detail-age-note"),
      app: document.getElementById("detail-app"),
      appNote: document.getElementById("detail-app-note")
    };

    function setStatus(type, message) {
      statusBox.className = "status visible " + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function setLoading(isLoading) {
      submitButton.disabled = isLoading;
      submitButton.textContent = isLoading ? "Scanning..." : "Search";
    }

    function formatNumber(value, digits = 0) {
      return new Intl.NumberFormat("en-US", {
        maximumFractionDigits: digits
      }).format(value);
    }

    function safeText(value, fallback = "-") {
      return value == null || value === "" ? fallback : String(value);
    }

    function formatDate(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return String(value);

      return new Intl.DateTimeFormat("en-US", {
        year: "numeric",
        month: "short",
        day: "numeric"
      }).format(date);
    }

    function openOverlay() {
      overlay.className = "overlay visible";
    }

    function closeOverlay() {
      overlay.className = "overlay";
      detailPanel.className = "detail-panel";
      detailLink.textContent = "View details";
    }

    function toggleDetails() {
      const visible = detailPanel.classList.contains("visible");
      detailPanel.className = visible ? "detail-panel" : "detail-panel visible";
      detailLink.textContent = visible ? "View details" : "Hide details";
    }

    function renderSummary(profilePayload, walletPayload) {
      const user = profilePayload.user || {};
      const profile = walletPayload?.profile || user || {};
      const metrics = walletPayload?.metrics || {};
      const persona = walletPayload?.persona || profile.wojak || {};
      const shortWallet = walletPayload?.privacy?.shortWallet || safeText(user.walletAddress || profile.walletAddress, "-");
      const favoriteApp = walletPayload?.favoriteAppSummary?.name || profile.favoriteApp || "-";
      const favoriteAppTx = walletPayload?.favoriteAppSummary?.txCount || null;

      fields.title.textContent = safeText(persona.title, "UNRANKED");
      fields.name.textContent = safeText(user.name || profile.name, "Unknown");
      fields.wallet.textContent = shortWallet;
      fields.flavor.textContent = safeText(persona.flavor, "A wallet profile shaped by onchain behavior.");

      fields.tier.textContent = safeText(profile.displayTier || profile.tierName, "Unranked");
      fields.tierNote.textContent = "";
      fields.badges.textContent = formatNumber(Number(profile.badgeCount || 0), 0);
      fields.tx.textContent = formatNumber(Number(metrics.allTimeTx || 0), 0);
      fields.fee.textContent = `${safeText(metrics.totalFeeEth, "0")} ETH`;
      fields.age.textContent = safeText(metrics.walletAgeText, "-");
      fields.ageNote.textContent = `First activity: ${formatDate(metrics.firstTransactionAt)}`;
      fields.app.textContent = safeText(favoriteApp, "-");
      fields.appNote.textContent = favoriteAppTx ? `${formatNumber(favoriteAppTx, 0)} transactions` : "Favorite app signal detected from onchain behavior.";

      openOverlay();
    }

    async function analyze(query) {
      setLoading(true);
      clearStatus();

      try {
        setStatus("loading", "Scanning onchain profile...");

        const profileResponse = await fetch("/api/profile?query=" + encodeURIComponent(query));
        const profilePayload = await profileResponse.json();

        if (!profileResponse.ok) {
          throw new Error(profilePayload.error || "Profile request failed.");
        }

        const walletAddress = profilePayload.user?.walletAddress;
        let walletPayload = null;

        if (walletAddress) {
          const walletResponse = await fetch("/api/wallet?address=" + encodeURIComponent(walletAddress));
          const walletJson = await walletResponse.json();
          if (!walletResponse.ok) {
            throw new Error(walletJson.error || "Wallet analysis failed.");
          }
          walletPayload = walletJson;
        }

        renderSummary(profilePayload, walletPayload);
        clearStatus();
      } catch (error) {
        setStatus("error", error.message || "Something went wrong.");
      } finally {
        setLoading(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const query = queryInput.value.trim();
      if (!query) {
        setStatus("error", "Enter a wallet or nickname.");
        return;
      }
      analyze(query);
    });

    closeButton.addEventListener("click", closeOverlay);
    detailLink.addEventListener("click", toggleDetails);
    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) {
        closeOverlay();
      }
    });
  </script>
</body>
</html>

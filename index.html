<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kobetsu</title>
  <style>
    :root {
      --bg: #f8fffb;
      --panel: rgba(255, 255, 255, 0.86);
      --panel-strong: rgba(255, 255, 255, 0.94);
      --line: rgba(27, 217, 123, 0.16);
      --line-strong: rgba(27, 217, 123, 0.28);
      --text: #0d1a16;
      --muted: #587068;
      --green: #20db7e;
      --green-soft: #73f0b3;
      --shadow: 0 18px 60px rgba(13, 26, 22, 0.08);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --max-width: 1120px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(32, 219, 126, 0.08), transparent 26%),
        radial-gradient(circle at bottom right, rgba(32, 219, 126, 0.07), transparent 30%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }

    .spark-field {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .spark {
      position: absolute;
      width: 44px;
      height: 44px;
      opacity: 0.18;
      animation:
        drift linear infinite,
        pulse ease-in-out infinite;
      filter: drop-shadow(0 0 14px rgba(32, 219, 126, 0.45));
    }

    .spark svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .spark path {
      fill: #24d97e;
    }

    .spark.s1 { top: 8%; left: 10%; animation-duration: 18s, 4s; transform: scale(0.8); }
    .spark.s2 { top: 18%; left: 82%; animation-duration: 24s, 5s; transform: scale(1.1); }
    .spark.s3 { top: 42%; left: 6%; animation-duration: 20s, 3.5s; transform: scale(0.95); }
    .spark.s4 { top: 58%; left: 88%; animation-duration: 26s, 5.4s; transform: scale(0.72); }
    .spark.s5 { top: 76%; left: 14%; animation-duration: 22s, 4.5s; transform: scale(1); }
    .spark.s6 { top: 82%; left: 74%; animation-duration: 28s, 5.5s; transform: scale(0.9); }
    .spark.s7 { top: 30%; left: 50%; animation-duration: 21s, 4.2s; transform: scale(0.7); }
    .spark.s8 { top: 12%; left: 38%; animation-duration: 25s, 5.1s; transform: scale(0.88); }

    @keyframes drift {
      0% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
      25% { transform: translate3d(18px, -20px, 0) scale(1.04) rotate(6deg); }
      50% { transform: translate3d(-12px, 22px, 0) scale(0.98) rotate(-8deg); }
      75% { transform: translate3d(20px, 14px, 0) scale(1.03) rotate(4deg); }
      100% { transform: translate3d(0, 0, 0) scale(1) rotate(0deg); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.08; filter: drop-shadow(0 0 8px rgba(32, 219, 126, 0.2)); }
      50% { opacity: 0.34; filter: drop-shadow(0 0 20px rgba(32, 219, 126, 0.55)); }
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(100% - 28px, var(--max-width));
      margin: 0 auto;
      padding: 34px 0 70px;
    }

    .shell {
      min-height: calc(100vh - 104px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .search-card,
    .result-card,
    .chart-card {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      border-radius: var(--radius-xl);
    }

    .search-card {
      padding: 22px;
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 12px;
      align-items: center;
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      height: 72px;
      padding: 0 18px;
      border-radius: 22px;
      border: 1px solid var(--line-strong);
      background: var(--panel-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7);
    }

    .search-input-wrap img {
      width: 34px;
      height: 34px;
      object-fit: cover;
      border-radius: 12px;
      flex: 0 0 auto;
      filter: drop-shadow(0 0 10px rgba(32, 219, 126, 0.22));
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 19px;
      font-weight: 600;
    }

    input::placeholder {
      color: #8ba39a;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      height: 72px;
      border-radius: 22px;
      padding: 0 24px;
      font-size: 16px;
      font-weight: 800;
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
    }

    .primary-button {
      min-width: 150px;
      color: #062114;
      background: linear-gradient(135deg, #86f6ba 0%, #41e28d 50%, #18c66e 100%);
      box-shadow: 0 12px 24px rgba(24, 198, 110, 0.22);
    }

    .secondary-button {
      min-width: 124px;
      color: #194133;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(27, 217, 123, 0.16);
    }

    .status {
      display: none;
      margin-top: 16px;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid transparent;
      background: rgba(255, 255, 255, 0.82);
      font-size: 14px;
      line-height: 1.6;
      color: var(--muted);
    }

    .status.visible {
      display: block;
    }

    .status.loading {
      border-color: rgba(27, 217, 123, 0.16);
      color: #2d5b49;
    }

    .status.success {
      border-color: rgba(27, 217, 123, 0.22);
      color: #175637;
    }

    .status.error {
      border-color: rgba(255, 102, 127, 0.18);
      color: #8d3145;
      background: rgba(255, 246, 248, 0.95);
    }

    .result-card,
    .chart-card {
      display: none;
      margin-top: 20px;
      padding: 22px;
    }

    .result-card.visible,
    .chart-card.visible {
      display: block;
    }

    .result-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .metric {
      padding: 18px;
      border-radius: var(--radius-lg);
      border: 1px solid rgba(27, 217, 123, 0.12);
      background: rgba(255, 255, 255, 0.84);
    }

    .metric-label {
      margin-bottom: 10px;
      color: #789088;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 12px;
    }

    .metric-value {
      font-size: clamp(22px, 3vw, 32px);
      letter-spacing: -0.05em;
      font-weight: 800;
      line-height: 1.06;
      word-break: break-word;
    }

    .metric-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .timeline {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }

    .timeline-item {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: start;
      padding: 16px 18px;
      border-radius: 18px;
      border: 1px solid rgba(27, 217, 123, 0.1);
      background: rgba(255, 255, 255, 0.8);
    }

    .timeline-label {
      color: #799188;
      font-size: 14px;
    }

    .timeline-value {
      text-align: right;
      font-weight: 700;
      word-break: break-word;
    }

    .chart {
      display: flex;
      align-items: end;
      gap: 10px;
      min-height: 230px;
    }

    .chart-bar {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .chart-value {
      min-height: 14px;
      font-size: 11px;
      color: #486b5e;
    }

    .chart-column {
      width: 100%;
      min-height: 4px;
      border-radius: 999px 999px 14px 14px;
      background: linear-gradient(180deg, #8ff6be 0%, #3cdf87 48%, #17b866 100%);
      box-shadow: inset 0 -8px 18px rgba(17, 91, 52, 0.12);
    }

    .chart-label {
      color: #7a988e;
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    @media (max-width: 860px) {
      .search-row {
        grid-template-columns: 1fr;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 16px, var(--max-width));
        padding-top: 18px;
      }

      .search-card,
      .result-card,
      .chart-card {
        padding: 16px;
      }

      .timeline-item {
        flex-direction: column;
      }

      .timeline-value {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="spark-field" aria-hidden="true">
    <div class="spark s1">
      <svg viewBox="0 0 100 100"><path d="M39 9h22l-7 24 24 7v20l-24-7-7 24H25l7-24-24-7V26l24 7z"/></svg>
    </div>
    <div class="spark s2">
      <svg viewBox="0 0 100 100"><path d="M39 9h22l-7 24 24 7v20l-24-7-7 24H25l7-24-24-7V26l24 7z"/></svg>
    </div>
    <div class="spark s3">
      <svg viewBox="0 0 100 100"><path d="M39 9h22l-7 24 24 7v20l-24-7-7 24H25l7-24-24-7V26l24 7z"/></svg>
    </div>
    <div class="spark s4">
      <svg viewBox="0 0 100 100"><path d="M39 9h22l-7 24 24 7v20l-24-7-7 24H25l7-24-24-7V26l24 7z"/></svg>
    </div>
    <div class="spark s5">
      <svg viewBox="0 0 100 100"><path d="M39 9h22l-7 24 24 7v20l-24-7-7 24H25l7-24-24-7V26l24 7z"/></svg>
    </div>
    <div class="spark s6">
      <svg viewBox="0 0 100 100"><path d="M39 9h22l-7 24 24 7v20l-24-7-7 24H25l7-24-24-7V26l24 7z"/></svg>
    </div>
    <div class="spark s7">
      <svg viewBox="0 0 100 100"><path d="M39 9h22l-7 24 24 7v20l-24-7-7 24H25l7-24-24-7V26l24 7z"/></svg>
    </div>
    <div class="spark s8">
      <svg viewBox="0 0 100 100"><path d="M39 9h22l-7 24 24 7v20l-24-7-7 24H25l7-24-24-7V26l24 7z"/></svg>
    </div>
  </div>

  <main class="page">
    <div class="shell">
      <div style="width:100%;">
        <section class="search-card">
          <form id="wallet-form">
            <div class="search-row">
              <div class="search-input-wrap">
                <input
                  id="wallet-address"
                  name="address"
                  type="text"
                  placeholder="0x..."
                  autocomplete="off"
                  spellcheck="false"
                />
                <img src="./assets/abstract-logo.jpg" alt="Abstract" />
              </div>
              <button class="primary-button" id="submit-button" type="submit">Search</button>
              <button class="secondary-button" id="sample-button" type="button">Sample</button>
            </div>
          </form>

          <div id="status" class="status" role="status" aria-live="polite"></div>
        </section>

        <section id="result" class="result-card" aria-live="polite">
          <div class="result-grid">
            <article class="metric">
              <div class="metric-label">Wallet</div>
              <div class="metric-value" id="wallet-value">-</div>
            </article>

            <article class="metric">
              <div class="metric-label">Balance</div>
              <div class="metric-value" id="balance-value">-</div>
              <div class="metric-note" id="balance-note">-</div>
            </article>

            <article class="metric">
              <div class="metric-label">Wallet age</div>
              <div class="metric-value" id="age-value">-</div>
              <div class="metric-note" id="age-note">-</div>
            </article>

            <article class="metric">
              <div class="metric-label">All-time TX</div>
              <div class="metric-value" id="all-time-value">-</div>
            </article>

            <article class="metric">
              <div class="metric-label">24h TX</div>
              <div class="metric-value" id="tx-24h-value">-</div>
            </article>

            <article class="metric">
              <div class="metric-label">7d TX</div>
              <div class="metric-value" id="tx-7d-value">-</div>
            </article>

            <article class="metric">
              <div class="metric-label">30d TX</div>
              <div class="metric-value" id="tx-30d-value">-</div>
            </article>

            <article class="metric">
              <div class="metric-label">Daily average</div>
              <div class="metric-value" id="avg-daily-value">-</div>
            </article>
          </div>

          <div class="timeline">
            <div class="timeline-item">
              <div class="timeline-label">First transaction</div>
              <div class="timeline-value" id="first-tx-value">-</div>
            </div>
            <div class="timeline-item">
              <div class="timeline-label">Last transaction</div>
              <div class="timeline-value" id="last-tx-value">-</div>
            </div>
          </div>
        </section>

        <section id="chart-card" class="chart-card">
          <div id="chart" class="chart"></div>
        </section>
      </div>
    </div>
  </main>

  <script>
    const form = document.getElementById("wallet-form");
    const addressInput = document.getElementById("wallet-address");
    const statusBox = document.getElementById("status");
    const resultSection = document.getElementById("result");
    const chartCard = document.getElementById("chart-card");
    const submitButton = document.getElementById("submit-button");
    const sampleButton = document.getElementById("sample-button");
    const sampleAddress = "0x000000000000000000000000000000000000dead";

    const fieldMap = {
      wallet: document.getElementById("wallet-value"),
      balance: document.getElementById("balance-value"),
      balanceNote: document.getElementById("balance-note"),
      age: document.getElementById("age-value"),
      ageNote: document.getElementById("age-note"),
      allTime: document.getElementById("all-time-value"),
      tx24h: document.getElementById("tx-24h-value"),
      tx7d: document.getElementById("tx-7d-value"),
      tx30d: document.getElementById("tx-30d-value"),
      avgDaily: document.getElementById("avg-daily-value"),
      firstTx: document.getElementById("first-tx-value"),
      lastTx: document.getElementById("last-tx-value"),
      chart: document.getElementById("chart")
    };

    function setStatus(type, message) {
      statusBox.className = "status visible " + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function setLoading(isLoading) {
      submitButton.disabled = isLoading;
      sampleButton.disabled = isLoading;
      submitButton.textContent = isLoading ? "Searching..." : "Search";
    }

    function formatNumber(value, maximumFractionDigits = 2) {
      return new Intl.NumberFormat("en-US", {
        maximumFractionDigits
      }).format(value);
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Intl.DateTimeFormat("en-US", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date(value));
    }

    function renderChart(points) {
      fieldMap.chart.innerHTML = "";

      const safePoints = Array.isArray(points) ? points : [];
      const maxValue = safePoints.reduce((max, point) => Math.max(max, point.count), 0) || 1;

      safePoints.forEach((point) => {
        const bar = document.createElement("div");
        bar.className = "chart-bar";

        const value = document.createElement("div");
        value.className = "chart-value";
        value.textContent = point.count > 0 ? String(point.count) : "";

        const column = document.createElement("div");
        column.className = "chart-column";
        column.style.height = Math.max(4, Math.round((point.count / maxValue) * 180)) + "px";

        const label = document.createElement("div");
        label.className = "chart-label";
        label.textContent = point.label;

        bar.append(value, column, label);
        fieldMap.chart.appendChild(bar);
      });
    }

    function renderResult(data) {
      const { metrics, transactionWindow, walletAddress, balance } = data;

      fieldMap.wallet.textContent = walletAddress;
      fieldMap.balance.textContent = balance.formatted + " ETH";
      fieldMap.balanceNote.textContent = balance.wei + " wei";
      fieldMap.age.textContent = metrics.walletAgeText;
      fieldMap.ageNote.textContent = metrics.firstTransactionAt ? formatDate(metrics.firstTransactionAt) : "-";
      fieldMap.allTime.textContent = formatNumber(metrics.allTimeTx, 0);
      fieldMap.tx24h.textContent = formatNumber(metrics.tx24h, 0);
      fieldMap.tx7d.textContent = formatNumber(metrics.tx7d, 0);
      fieldMap.tx30d.textContent = formatNumber(metrics.tx30d, 0);
      fieldMap.avgDaily.textContent = formatNumber(metrics.averageDailyTx);
      fieldMap.firstTx.textContent = formatDate(metrics.firstTransactionAt);
      fieldMap.lastTx.textContent = formatDate(metrics.lastTransactionAt);

      renderChart(transactionWindow.dailyChart);
      resultSection.className = "result-card visible";
      chartCard.className = "chart-card visible";
    }

    async function analyzeWallet(address) {
      setLoading(true);
      clearStatus();
      resultSection.className = "result-card";
      chartCard.className = "chart-card";

      try {
        setStatus("loading", "Loading...");

        const response = await fetch("/api/wallet?address=" + encodeURIComponent(address));
        const payload = await response.json();

        if (!response.ok) {
          throw new Error(payload.error || "Unknown error.");
        }

        renderResult(payload);
        setStatus("success", "Done.");
      } catch (error) {
        setStatus("error", error.message || "Unexpected request error.");
      } finally {
        setLoading(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();

      const address = addressInput.value.trim();
      if (!/^0x[a-fA-F0-9]{40}$/.test(address)) {
        setStatus("error", "Enter a valid wallet.");
        resultSection.className = "result-card";
        chartCard.className = "chart-card";
        return;
      }

      analyzeWallet(address);
    });

    sampleButton.addEventListener("click", () => {
      addressInput.value = sampleAddress;
      addressInput.focus();
    });
  </script>
</body>
</html>

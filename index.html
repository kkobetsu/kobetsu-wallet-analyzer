<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kobetsu Abstract Title Scanner</title>
  <style>
    :root {
      --bg: #f7fff9;
      --panel: rgba(255, 255, 255, 0.94);
      --line: rgba(27, 204, 118, 0.16);
      --line-strong: rgba(27, 204, 118, 0.3);
      --text: #102118;
      --muted: #62786d;
      --green: #16cf73;
      --green-deep: #0ea95d;
      --shadow: 0 26px 80px rgba(14, 35, 24, 0.12);
      --danger: #c94a69;
      --radius-xl: 32px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --max-width: 1040px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(22, 207, 115, 0.14), transparent 30%),
        radial-gradient(circle at 100% 10%, rgba(22, 207, 115, 0.12), transparent 26%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }

    .page {
      width: min(100% - 24px, var(--max-width));
      margin: 0 auto;
      min-height: 100vh;
      display: grid;
      align-content: center;
      padding: 36px 0;
    }

    .search-shell {
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
    }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 190px;
      gap: 14px;
      align-items: center;
    }

    .input-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      height: 82px;
      padding: 0 20px;
      border-radius: 28px;
      border: 1px solid var(--line-strong);
      background: rgba(255, 255, 255, 0.98);
    }

    .input-wrap img {
      width: 36px;
      height: 36px;
      object-fit: contain;
      flex: 0 0 auto;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 22px;
      font-weight: 900;
    }

    input::placeholder {
      color: #8aa095;
      font-weight: 700;
    }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      height: 82px;
      border-radius: 28px;
      font-size: 18px;
      font-weight: 900;
      color: #072014;
      background: linear-gradient(135deg, #97f6bf 0%, #49df8e 55%, #13bc68 100%);
      box-shadow: 0 14px 30px rgba(19, 188, 104, 0.24);
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    button:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    button:disabled {
      opacity: 0.65;
      cursor: wait;
      transform: none;
    }

    .status {
      display: none;
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid transparent;
      font-size: 14px;
      line-height: 1.6;
    }

    .status.visible { display: block; }
    .status.loading {
      color: #2d5a49;
      background: rgba(244, 255, 248, 0.96);
      border-color: rgba(27, 204, 118, 0.16);
    }
    .status.error {
      color: var(--danger);
      background: rgba(255, 246, 248, 0.96);
      border-color: rgba(201, 74, 105, 0.18);
    }

    .overlay {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 20px;
      background: rgba(241, 255, 247, 0.62);
      backdrop-filter: blur(8px);
      z-index: 10;
    }

    .overlay.visible {
      display: grid;
    }

    .summary-card {
      position: relative;
      width: min(100%, 900px);
      border-radius: 36px;
      border: 1px solid var(--line-strong);
      background:
        radial-gradient(circle at top center, rgba(22, 207, 115, 0.15), transparent 36%),
        rgba(255, 255, 255, 0.98);
      box-shadow: 0 34px 90px rgba(14, 35, 24, 0.18);
      overflow: hidden;
    }

    .close-button {
      position: absolute;
      right: 18px;
      top: 18px;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      border: 1px solid rgba(27, 204, 118, 0.14);
      background: rgba(243, 255, 248, 0.96);
      color: #177a49;
      font-size: 22px;
      font-weight: 800;
      box-shadow: none;
    }

    .summary-body {
      padding: 40px 34px 30px;
      display: grid;
      gap: 24px;
      justify-items: center;
      text-align: center;
    }

    .summary-label {
      font-size: 13px;
      font-weight: 900;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #5b786b;
    }

    .summary-title {
      margin: 0;
      font-size: clamp(68px, 13vw, 150px);
      line-height: 0.84;
      letter-spacing: -0.1em;
      font-weight: 900;
      color: var(--green);
      text-shadow: 0 0 28px rgba(22, 207, 115, 0.2);
    }

    .summary-name {
      font-size: clamp(24px, 4vw, 34px);
      font-weight: 900;
      letter-spacing: -0.04em;
    }

    .summary-subline {
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
      max-width: 720px;
    }

    .detail-link {
      appearance: none;
      border: none;
      background: transparent;
      color: #157749;
      font-size: 14px;
      font-weight: 800;
      text-decoration: underline;
      height: auto;
      box-shadow: none;
      padding: 0;
    }

    .detail-panel {
      display: none;
      width: 100%;
      margin-top: 4px;
      padding-top: 18px;
      border-top: 1px solid rgba(27, 204, 118, 0.1);
    }

    .detail-panel.visible {
      display: block;
    }

    .detail-grid {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      text-align: left;
    }

    .detail-item {
      padding: 16px;
      border-radius: 18px;
      background: rgba(248, 255, 251, 0.96);
      border: 1px solid rgba(27, 204, 118, 0.1);
    }

    .detail-key {
      color: #678076;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .detail-value {
      font-size: 24px;
      line-height: 1.06;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: #153023;
      word-break: break-word;
    }

    .detail-note {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      .search-row {
        grid-template-columns: 1fr;
      }

      .detail-grid {
        grid-template-columns: 1fr;
      }

      .summary-body {
        padding: 34px 20px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="search-shell">
      <form id="search-form">
        <div class="search-row">
          <div class="input-wrap">
            <input id="query-input" type="text" placeholder="wallet veya nickname" autocomplete="off" spellcheck="false" />
            <img src="./assets/abstract-glow.png" alt="Abstract" />
          </div>
          <button id="submit-button" type="submit">Search</button>
        </div>
      </form>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>
  </main>

  <section id="overlay" class="overlay">
    <article class="summary-card">
      <button id="close-button" class="close-button" type="button">×</button>
      <div class="summary-body">
        <div class="summary-label">Abstract Wojak Title</div>
        <h1 id="summary-title" class="summary-title">-</h1>
        <div id="summary-name" class="summary-name">-</div>
        <div id="summary-subline" class="summary-subline">-</div>
        <button id="detail-link" class="detail-link" type="button">Detaylari gor</button>

        <div id="detail-panel" class="detail-panel">
          <div class="detail-grid">
            <div class="detail-item">
              <div class="detail-key">Portal Tier</div>
              <div id="detail-tier" class="detail-value">-</div>
              <div id="detail-tier-note" class="detail-note">-</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Badge Count</div>
              <div id="detail-badges" class="detail-value">-</div>
              <div class="detail-note">Toplam kazanilan badge</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Transactions</div>
              <div id="detail-tx" class="detail-value">-</div>
              <div class="detail-note">All-time</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Fee Spent</div>
              <div id="detail-fee" class="detail-value">-</div>
              <div class="detail-note">All-time chain fee</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Wallet Age</div>
              <div id="detail-age" class="detail-value">-</div>
              <div id="detail-age-note" class="detail-note">-</div>
            </div>

            <div class="detail-item">
              <div class="detail-key">Favorite App</div>
              <div id="detail-app" class="detail-value">-</div>
              <div id="detail-app-note" class="detail-note">-</div>
            </div>
          </div>
        </div>
      </div>
    </article>
  </section>

  <script>
    const form = document.getElementById("search-form");
    const queryInput = document.getElementById("query-input");
    const submitButton = document.getElementById("submit-button");
    const statusBox = document.getElementById("status");
    const overlay = document.getElementById("overlay");
    const closeButton = document.getElementById("close-button");
    const detailLink = document.getElementById("detail-link");
    const detailPanel = document.getElementById("detail-panel");

    const fields = {
      title: document.getElementById("summary-title"),
      name: document.getElementById("summary-name"),
      subline: document.getElementById("summary-subline"),
      tier: document.getElementById("detail-tier"),
      tierNote: document.getElementById("detail-tier-note"),
      badges: document.getElementById("detail-badges"),
      tx: document.getElementById("detail-tx"),
      fee: document.getElementById("detail-fee"),
      age: document.getElementById("detail-age"),
      ageNote: document.getElementById("detail-age-note"),
      app: document.getElementById("detail-app"),
      appNote: document.getElementById("detail-app-note")
    };

    const TIER_V2_MAP = {
      1: "Bronze I",
      2: "Bronze II",
      3: "Bronze III",
      4: "Silver I",
      5: "Silver II",
      6: "Silver III",
      7: "Gold I",
      8: "Gold II",
      9: "Gold III",
      10: "Diamond I",
      11: "Diamond II",
      12: "Diamond III"
    };

    function setStatus(type, message) {
      statusBox.className = "status visible " + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function setLoading(isLoading) {
      submitButton.disabled = isLoading;
      submitButton.textContent = isLoading ? "Loading..." : "Search";
    }

    function formatNumber(value, digits = 0) {
      return new Intl.NumberFormat("en-US", {
        maximumFractionDigits: digits
      }).format(value);
    }

    function safeText(value, fallback = "-") {
      return value == null || value === "" ? fallback : String(value);
    }

    function buildTierDisplay(profile) {
      const activityTier = profile.tierName ? String(profile.tierName) : null;
      const portalTier = profile.tierV2 != null ? TIER_V2_MAP[profile.tierV2] || `Tier ${profile.tierV2}` : null;

      if (activityTier && portalTier) {
        return {
          main: activityTier,
          note: `Portal ${portalTier}`
        };
      }

      if (portalTier) {
        return {
          main: portalTier,
          note: "Portal ladder"
        };
      }

      if (profile.tier != null) {
        return {
          main: `Tier ${profile.tier}`,
          note: "Legacy profile tier"
        };
      }

      return {
        main: "-",
        note: "-"
      };
    }

    function openOverlay() {
      overlay.className = "overlay visible";
    }

    function closeOverlay() {
      overlay.className = "overlay";
      detailPanel.className = "detail-panel";
      detailLink.textContent = "Detaylari gor";
    }

    function toggleDetails() {
      const visible = detailPanel.classList.contains("visible");
      detailPanel.className = visible ? "detail-panel" : "detail-panel visible";
      detailLink.textContent = visible ? "Detaylari gor" : "Detaylari gizle";
    }

    function renderSummary(profilePayload, walletPayload) {
      const user = profilePayload.user || {};
      const metrics = walletPayload?.metrics || {};
      const profile = walletPayload?.profile || user || {};
      const persona = profile.wojak || walletPayload?.persona || {};
      const tierDisplay = buildTierDisplay(profile);
      const favoriteApp = profile.favoriteApp || walletPayload?.favoriteAppSummary?.name || walletPayload?.appSummary?.mostUsed?.name || "-";
      const favoriteAppTx = walletPayload?.favoriteAppSummary?.txCount || walletPayload?.appSummary?.mostUsed?.txCount || null;

      fields.title.textContent = safeText(persona.title, "UNRANKED");
      fields.name.textContent = safeText(user.name || profile.name, "Unknown");
      fields.subline.textContent = safeText(user.walletAddress || profile.walletAddress, "-");
      fields.tier.textContent = tierDisplay.main;
      fields.tierNote.textContent = tierDisplay.note;
      fields.badges.textContent = safeText(profile.badgeCount, 0);
      fields.tx.textContent = formatNumber(metrics.allTimeTx || 0, 0);
      fields.fee.textContent = safeText(metrics.totalFeeEth, "0") + " ETH";
      fields.age.textContent = safeText(metrics.walletAgeText, "-");
      fields.ageNote.textContent = safeText(metrics.firstTransactionAt, "-");
      fields.app.textContent = safeText(favoriteApp, "-");
      fields.appNote.textContent = favoriteAppTx ? `${formatNumber(favoriteAppTx, 0)} tx` : "No app data";

      openOverlay();
    }

    async function analyze(query) {
      setLoading(true);
      clearStatus();

      try {
        setStatus("loading", "Title hesaplaniyor...");

        const profileResponse = await fetch("/api/profile?query=" + encodeURIComponent(query));
        const profilePayload = await profileResponse.json();

        if (!profileResponse.ok) {
          throw new Error(profilePayload.error || "Profile request failed.");
        }

        const walletAddress = profilePayload.user?.walletAddress;
        let walletPayload = null;

        if (walletAddress) {
          const walletResponse = await fetch("/api/wallet?address=" + encodeURIComponent(walletAddress));
          const walletJson = await walletResponse.json();
          if (walletResponse.ok) {
            walletPayload = walletJson;
          }
        }

        renderSummary(profilePayload, walletPayload);
        clearStatus();
      } catch (error) {
        setStatus("error", error.message || "Beklenmeyen bir hata olustu.");
      } finally {
        setLoading(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const query = queryInput.value.trim();
      if (!query) {
        setStatus("error", "Wallet veya nickname gir.");
        return;
      }
      analyze(query);
    });

    closeButton.addEventListener("click", closeOverlay);
    detailLink.addEventListener("click", toggleDetails);
    overlay.addEventListener("click", (event) => {
      if (event.target === overlay) {
        closeOverlay();
      }
    });
  </script>
</body>
</html>

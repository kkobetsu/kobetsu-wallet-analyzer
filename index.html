<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kobetsu Abstract Search</title>
  <style>
    :root {
      --bg: #f7fffb;
      --panel: rgba(255, 255, 255, 0.88);
      --panel-strong: rgba(255, 255, 255, 0.96);
      --line: rgba(29, 213, 122, 0.12);
      --line-strong: rgba(29, 213, 122, 0.28);
      --text: #0c1915;
      --muted: #60766e;
      --green: #1ed57a;
      --danger: #ff647e;
      --shadow: 0 18px 60px rgba(14, 28, 22, 0.08);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --max-width: 1160px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(30, 213, 122, 0.08), transparent 24%),
        radial-gradient(circle at 90% 90%, rgba(30, 213, 122, 0.06), transparent 24%),
        linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
    }

    .background-glows {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .glow {
      position: absolute;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30, 213, 122, 0.16), transparent 68%);
      filter: blur(18px);
      opacity: 0.85;
      animation: pulseGlow 8s ease-in-out infinite;
    }

    .glow.g1 { top: -90px; left: -80px; }
    .glow.g2 { right: -120px; top: 180px; animation-delay: 1.8s; }
    .glow.g3 { left: 28%; bottom: -140px; animation-delay: 3.1s; }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(0.96); opacity: 0.5; }
      50% { transform: scale(1.08); opacity: 0.95; }
    }

    .page {
      position: relative;
      z-index: 1;
      width: min(100% - 24px, var(--max-width));
      margin: 0 auto;
      padding: 18px 0 60px;
    }

    .top-lane {
      position: relative;
      height: 98px;
      margin-bottom: 12px;
      overflow: hidden;
      border-radius: 28px;
      border: 1px solid rgba(29, 213, 122, 0.1);
      background: rgba(255, 255, 255, 0.42);
      backdrop-filter: blur(10px);
    }

    .runner-wrap {
      position: absolute;
      inset: 0;
      animation: laneMove 60s linear infinite;
    }

    .runner-logo {
      position: absolute;
      top: 18px;
      left: 0;
      width: 64px;
      height: 64px;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(30, 213, 122, 0.45));
      animation: logoSpin 5s linear infinite;
    }

    .runner-dog {
      position: absolute;
      top: 24px;
      left: -88px;
      width: 54px;
      height: 54px;
      object-fit: contain;
      image-rendering: pixelated;
      animation: dogBounce 0.8s ease-in-out infinite;
    }

    @keyframes laneMove {
      from { transform: translateX(-140px); }
      to { transform: translateX(calc(100vw + 140px)); }
    }

    @keyframes logoSpin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    @keyframes dogBounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    .search-card,
    .result-card,
    .apps-card,
    .chart-card {
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      background: var(--panel);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
    }

    .search-card { padding: 18px; }

    .search-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
    }

    .search-input-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      height: 76px;
      padding: 0 18px;
      border-radius: 24px;
      border: 1px solid var(--line-strong);
      background: var(--panel-strong);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.7), 0 10px 30px rgba(18, 191, 103, 0.05);
    }

    .search-input-wrap img {
      width: 38px;
      height: 38px;
      object-fit: contain;
      filter: drop-shadow(0 0 16px rgba(30, 213, 122, 0.32));
      flex: 0 0 auto;
    }

    input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: var(--text);
      font-size: 19px;
      font-weight: 700;
    }

    input::placeholder { color: #91a59f; font-weight: 600; }

    button {
      appearance: none;
      border: none;
      cursor: pointer;
      height: 76px;
      padding: 0 28px;
      border-radius: 24px;
      font-size: 16px;
      font-weight: 800;
      transition: transform 160ms ease, filter 160ms ease, opacity 160ms ease;
    }

    button:hover { transform: translateY(-1px); filter: brightness(1.03); }
    button:disabled { opacity: 0.65; cursor: wait; transform: none; }

    .primary-button {
      min-width: 160px;
      color: #062014;
      background: linear-gradient(135deg, #8ef8be 0%, #45df8c 52%, #11be66 100%);
      box-shadow: 0 12px 28px rgba(17, 190, 102, 0.22);
    }

    .status {
      display: none;
      margin-top: 14px;
      padding: 15px 18px;
      border-radius: 18px;
      border: 1px solid transparent;
      font-size: 14px;
      line-height: 1.6;
    }

    .status.visible { display: block; }
    .status.loading {
      color: #2d5a49;
      background: rgba(245, 255, 249, 0.95);
      border-color: rgba(29, 213, 122, 0.14);
    }
    .status.success {
      color: #1e5a39;
      background: rgba(243, 255, 248, 0.95);
      border-color: rgba(29, 213, 122, 0.2);
    }
    .status.error {
      color: #8d3345;
      background: rgba(255, 246, 248, 0.95);
      border-color: rgba(255, 100, 126, 0.18);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 10px 14px;
      border-radius: 999px;
      border: 1px solid rgba(29, 213, 122, 0.14);
      background: rgba(255, 255, 255, 0.82);
      color: #42665a;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      user-select: none;
    }

    .tab.active {
      border-color: rgba(29, 213, 122, 0.28);
      background: rgba(232, 255, 242, 0.98);
      color: #167546;
      box-shadow: 0 0 0 1px rgba(29, 213, 122, 0.12) inset;
    }

    .result-card,
    .apps-card,
    .chart-card {
      display: none;
      margin-top: 18px;
      padding: 18px;
    }

    .result-card.visible,
    .apps-card.visible,
    .chart-card.visible {
      display: block;
    }

    .result-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 220px repeat(3, minmax(0, 1fr));
      align-items: stretch;
    }

    .profile-card,
    .metric-card {
      border: 1px solid rgba(29, 213, 122, 0.12);
      border-radius: var(--radius-lg);
      background: rgba(255, 255, 255, 0.85);
      min-height: 210px;
    }

    .profile-card {
      padding: 18px;
      display: grid;
      gap: 14px;
      align-content: start;
      justify-items: start;
    }

    .avatar {
      width: 84px;
      height: 84px;
      padding: 4px;
      border-radius: 26px;
      background: linear-gradient(135deg, #8ef8be, #52eca0);
      box-shadow: 0 10px 22px rgba(29, 213, 122, 0.16);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      border-radius: 22px;
      image-rendering: pixelated;
      background: transparent;
    }

    .profile-name {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 1;
      word-break: break-word;
    }

    .profile-wallet {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
      word-break: break-all;
    }

    .profile-tier {
      color: #17904f;
      font-size: 20px;
      font-weight: 900;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .portal-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 16px;
      border-radius: 16px;
      border: 1px solid rgba(29, 213, 122, 0.16);
      background: rgba(240, 255, 247, 0.96);
      color: #13814a;
      font-size: 14px;
      font-weight: 800;
      text-decoration: none;
    }

    .metric-card {
      padding: 20px;
      display: grid;
      align-content: space-between;
      gap: 16px;
      background: radial-gradient(circle at center, rgba(29, 213, 122, 0.1), transparent 64%), rgba(255, 255, 255, 0.88);
    }

    .metric-label {
      color: #5e776e;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 13px;
      font-weight: 800;
    }

    .metric-value {
      font-size: clamp(34px, 4vw, 72px);
      line-height: 0.95;
      letter-spacing: -0.06em;
      font-weight: 900;
      color: #19d37a;
      text-shadow: 0 0 22px rgba(29, 213, 122, 0.18);
      word-break: break-word;
    }

    .metric-foot {
      color: #7a938b;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: end;
    }

    .apps-card { padding: 0; overflow: hidden; }

    .apps-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 18px;
      border-bottom: 1px solid rgba(29, 213, 122, 0.1);
    }

    .apps-title {
      font-size: 14px;
      font-weight: 900;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #40685a;
    }

    .apps-count {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(237, 255, 245, 0.96);
      border: 1px solid rgba(29, 213, 122, 0.16);
      color: #14844c;
      font-size: 13px;
      font-weight: 900;
    }

    .apps-list { display: grid; }

    .app-row {
      display: grid;
      grid-template-columns: 46px minmax(0, 1fr) minmax(180px, 240px);
      gap: 14px;
      align-items: center;
      padding: 18px;
      border-top: 1px solid rgba(29, 213, 122, 0.08);
    }

    .app-rank {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: rgba(240, 255, 247, 0.96);
      color: #169252;
      font-size: 14px;
      font-weight: 900;
    }

    .app-name {
      font-size: 16px;
      font-weight: 900;
      color: #13241d;
      margin-bottom: 4px;
    }

    .app-sub {
      color: #6c847c;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }

    .app-stats {
      display: grid;
      gap: 8px;
      justify-items: end;
    }

    .bar {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(29, 213, 122, 0.12);
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, #37de86, #17c56c);
    }

    .app-tx {
      color: #15914f;
      font-size: 14px;
      font-weight: 900;
    }

    .chart { display: flex; align-items: end; gap: 10px; min-height: 220px; }

    .chart-bar {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 10px;
      justify-items: center;
    }

    .chart-value {
      min-height: 14px;
      color: #5a7d70;
      font-size: 11px;
    }

    .chart-column {
      width: 100%;
      min-height: 4px;
      border-radius: 999px 999px 14px 14px;
      background: linear-gradient(180deg, #8ff8be 0%, #45df8c 50%, #12bf67 100%);
      box-shadow: inset 0 -8px 18px rgba(18, 191, 103, 0.16);
    }

    .chart-label {
      color: #7b968d;
      font-size: 11px;
      letter-spacing: 0.06em;
    }

    @media (max-width: 980px) {
      .result-grid { grid-template-columns: 1fr; }
      .app-row { grid-template-columns: 46px minmax(0, 1fr); }
      .app-stats { justify-items: start; }
    }

    @media (max-width: 720px) {
      .search-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 640px) {
      .page { width: min(100% - 16px, var(--max-width)); padding-top: 12px; }
      .search-card, .result-card, .chart-card { padding: 14px; }
      .metric-foot, .apps-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="background-glows" aria-hidden="true">
    <div class="glow g1"></div>
    <div class="glow g2"></div>
    <div class="glow g3"></div>
  </div>

  <main class="page">
    <div class="top-lane">
      <div class="runner-wrap">
        <img class="runner-logo" src="./assets/abstract-glow.png" alt="Abstract glow" />
        <img class="runner-dog" src="./assets/kobetsu-pfp.png" alt="Kobetsu dog" />
      </div>
    </div>

    <section class="search-card">
      <form id="wallet-form">
        <div class="search-row">
          <div class="search-input-wrap">
            <input id="wallet-address" name="address" type="text" placeholder="wallet address" autocomplete="off" spellcheck="false" />
            <img src="./assets/abstract-glow.png" alt="Abstract" />
          </div>
          <button class="primary-button" id="submit-button" type="submit">Search</button>
        </div>
      </form>

      <div class="toolbar">
        <div class="tab" data-range="24h">24H</div>
        <div class="tab active" data-range="7d">7D</div>
        <div class="tab" data-range="30d">1M</div>
        <div class="tab" data-range="all">All Time</div>
      </div>

      <div id="status" class="status" role="status" aria-live="polite"></div>
    </section>

    <section id="result" class="result-card">
      <div class="result-grid">
        <article class="profile-card">
          <div class="avatar">
            <img src="./assets/kobetsu-pfp.png" alt="Profile" />
          </div>
          <div class="profile-name" id="profile-name">Unknown</div>
          <div class="profile-wallet" id="wallet-value">-</div>
          <div class="profile-tier" id="profile-tier">Tier unavailable</div>
          <a class="portal-link" href="https://portal.abs.xyz/" target="_blank" rel="noreferrer">Portal</a>
        </article>

        <article class="metric-card">
          <div class="metric-label">Transactions</div>
          <div class="metric-value" id="transactions-value">-</div>
          <div class="metric-foot">
            <span id="transactions-foot">7 Days</span>
            <span id="all-time-foot">All-time TX: -</span>
          </div>
        </article>

        <article class="metric-card">
          <div class="metric-label">Badges</div>
          <div class="metric-value" id="badges-value">-</div>
          <div class="metric-foot">
            <span>Total</span>
            <span id="badges-foot">Not connected</span>
          </div>
        </article>

        <article class="metric-card">
          <div class="metric-label">Most Used</div>
          <div class="metric-value" id="most-used-value">-</div>
          <div class="metric-foot">
            <span id="most-used-foot">7 Days</span>
            <span id="apps-total-foot">0 dApp</span>
          </div>
        </article>
      </div>

      <div style="display:grid;gap:12px;margin-top:16px;grid-template-columns:1fr 1fr;">
        <div style="padding:18px;border-radius:22px;border:1px solid rgba(29,213,122,0.12);background:rgba(255,255,255,0.84);">
          <div class="metric-label">Balance</div>
          <div class="metric-value" id="balance-value" style="font-size:34px;">-</div>
          <div style="margin-top:10px;color:var(--muted);font-size:13px;" id="balance-note">-</div>
        </div>
        <div style="padding:18px;border-radius:22px;border:1px solid rgba(29,213,122,0.12);background:rgba(255,255,255,0.84);">
          <div class="metric-label">Wallet age</div>
          <div class="metric-value" id="age-value" style="font-size:34px;">-</div>
          <div style="margin-top:10px;color:var(--muted);font-size:13px;" id="age-note">-</div>
        </div>
      </div>
    </section>

    <section id="apps-card" class="apps-card">
      <div class="apps-head">
        <div class="apps-title">Apps interacted with</div>
        <div class="apps-count" id="apps-count">0 dApp</div>
      </div>
      <div class="apps-list" id="apps-list"></div>
    </section>

    <section id="chart-card" class="chart-card">
      <div id="chart" class="chart"></div>
    </section>
  </main>

  <script>
    const form = document.getElementById("wallet-form");
    const addressInput = document.getElementById("wallet-address");
    const statusBox = document.getElementById("status");
    const resultSection = document.getElementById("result");
    const appsCard = document.getElementById("apps-card");
    const chartCard = document.getElementById("chart-card");
    const submitButton = document.getElementById("submit-button");
    const tabs = Array.from(document.querySelectorAll(".tab"));

    let latestPayload = null;
    let activeRange = "7d";

    const fieldMap = {
      profileName: document.getElementById("profile-name"),
      wallet: document.getElementById("wallet-value"),
      tier: document.getElementById("profile-tier"),
      transactions: document.getElementById("transactions-value"),
      transactionsFoot: document.getElementById("transactions-foot"),
      allTimeFoot: document.getElementById("all-time-foot"),
      badges: document.getElementById("badges-value"),
      badgesFoot: document.getElementById("badges-foot"),
      mostUsed: document.getElementById("most-used-value"),
      mostUsedFoot: document.getElementById("most-used-foot"),
      appsTotalFoot: document.getElementById("apps-total-foot"),
      balance: document.getElementById("balance-value"),
      balanceNote: document.getElementById("balance-note"),
      age: document.getElementById("age-value"),
      ageNote: document.getElementById("age-note"),
      appsCount: document.getElementById("apps-count"),
      appsList: document.getElementById("apps-list"),
      chart: document.getElementById("chart")
    };

    function setStatus(type, message) {
      statusBox.className = "status visible " + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function setLoading(isLoading) {
      submitButton.disabled = isLoading;
      submitButton.textContent = isLoading ? "Searching..." : "Search";
    }

    function formatNumber(value, maximumFractionDigits = 2) {
      return new Intl.NumberFormat("en-US", { maximumFractionDigits }).format(value);
    }

    function formatDate(value) {
      if (!value) return "-";
      return new Intl.DateTimeFormat("en-US", {
        dateStyle: "medium",
        timeStyle: "short"
      }).format(new Date(value));
    }

    function selectTab(range) {
      activeRange = range;
      tabs.forEach((tab) => tab.classList.toggle("active", tab.dataset.range === range));
      if (latestPayload) renderResult(latestPayload);
    }

    function buildAppSummary(transactions) {
      const groups = new Map();

      (transactions || []).forEach((tx) => {
        const key = String(tx.to || tx.contractAddress || "").toLowerCase();
        if (!key) return;

        const current = groups.get(key) || {
          name: key.slice(0, 10) + "..." + key.slice(-4),
          address: key,
          txCount: 0
        };

        current.txCount += 1;
        groups.set(key, current);
      });

      return Array.from(groups.values())
        .sort((a, b) => b.txCount - a.txCount)
        .slice(0, 8);
    }

    function getRangeValue(metrics) {
      if (activeRange === "24h") return { value: metrics.tx24h, label: "24 Hours" };
      if (activeRange === "30d") return { value: metrics.tx30d, label: "30 Days" };
      if (activeRange === "all") return { value: metrics.allTimeTx, label: "All Time" };
      return { value: metrics.tx7d, label: "7 Days" };
    }

    function renderApps(apps) {
      fieldMap.appsList.innerHTML = "";
      const maxTx = apps.reduce((max, item) => Math.max(max, item.txCount || 0), 0) || 1;

      apps.forEach((app, index) => {
        const row = document.createElement("div");
        row.className = "app-row";
        row.innerHTML = `
          <div class="app-rank">${index + 1}</div>
          <div>
            <div class="app-name">${app.name}</div>
            <div class="app-sub">${app.address}</div>
          </div>
          <div class="app-stats">
            <div class="bar"><div class="bar-fill" style="width:${Math.max(8, Math.round((app.txCount / maxTx) * 100))}%"></div></div>
            <div class="app-tx">${formatNumber(app.txCount, 0)} TX</div>
          </div>
        `;
        fieldMap.appsList.appendChild(row);
      });
    }

    function renderChart(points) {
      fieldMap.chart.innerHTML = "";
      const maxValue = points.reduce((max, point) => Math.max(max, point.count), 0) || 1;

      points.forEach((point) => {
        const bar = document.createElement("div");
        bar.className = "chart-bar";
        bar.innerHTML = `
          <div class="chart-value">${point.count > 0 ? point.count : ""}</div>
          <div class="chart-column" style="height:${Math.max(4, Math.round((point.count / maxValue) * 170))}px"></div>
          <div class="chart-label">${point.label}</div>
        `;
        fieldMap.chart.appendChild(bar);
      });
    }

    function renderResult(data) {
      const { metrics, transactionWindow, walletAddress, balance, profile } = data;
      const apps = buildAppSummary(transactionWindow.recentTransactions || []);
      const mostUsed = apps[0];
      const rangeInfo = getRangeValue(metrics);

      fieldMap.profileName.textContent = profile?.name || "Unknown";
      fieldMap.wallet.textContent = walletAddress;
      fieldMap.tier.textContent = profile?.tier || "Tier unavailable";
      fieldMap.transactions.textContent = formatNumber(rangeInfo.value, 0);
      fieldMap.transactionsFoot.textContent = rangeInfo.label;
      fieldMap.allTimeFoot.textContent = "All-time TX: " + formatNumber(metrics.allTimeTx, 0);
      fieldMap.badges.textContent = profile?.badgeCount != null ? formatNumber(profile.badgeCount, 0) : "-";
      fieldMap.badgesFoot.textContent = profile?.badgesSource || "Not connected";
      fieldMap.mostUsed.textContent = mostUsed ? mostUsed.name : "-";
      fieldMap.mostUsedFoot.textContent = rangeInfo.label;
      fieldMap.appsTotalFoot.textContent = apps.length + " dApp";
      fieldMap.balance.textContent = balance.formatted + " ETH";
      fieldMap.balanceNote.textContent = balance.wei + " wei";
      fieldMap.age.textContent = metrics.walletAgeText;
      fieldMap.ageNote.textContent = metrics.firstTransactionAt ? formatDate(metrics.firstTransactionAt) : "-";
      fieldMap.appsCount.textContent = apps.length + " dApp";

      renderApps(apps);
      renderChart(transactionWindow.dailyChart || []);

      resultSection.className = "result-card visible";
      appsCard.className = "apps-card visible";
      chartCard.className = "chart-card visible";
    }

    async function analyzeWallet(input) {
      setLoading(true);
      clearStatus();
      resultSection.className = "result-card";
      appsCard.className = "apps-card";
      chartCard.className = "chart-card";

      try {
        setStatus("loading", "Loading...");

        const response = await fetch("/api/wallet?address=" + encodeURIComponent(input));
        const text = await response.text();

        let payload;
        try {
          payload = JSON.parse(text);
        } catch {
          throw new Error(text || "Server returned a non-JSON response.");
        }

        if (!response.ok) {
          throw new Error(payload.error || "Unknown error.");
        }

        latestPayload = payload;
        renderResult(payload);
        setStatus("success", "Done.");
      } catch (error) {
        setStatus("error", error.message || "Unexpected request error.");
      } finally {
        setLoading(false);
      }
    }

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const input = addressInput.value.trim();
      if (!/^0x[a-fA-F0-9]{40}$/.test(input)) {
        setStatus("error", "Enter a valid wallet address.");
        return;
      }
      analyzeWallet(input);
    });

    tabs.forEach((tab) => {
      tab.addEventListener("click", () => selectTab(tab.dataset.range));
    });
  </script>
</body>
</html>
